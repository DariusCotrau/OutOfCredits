<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grile Licenta 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <!-- HOME SCREEN -->
    <div id="homeScreen" class="screen active">
        <div class="home-container">
            <div class="home-hero">
                <div class="logo">GL</div>
                <h1>Grile Licenta 2026</h1>
                <p class="subtitle" id="homeStats">Se incarca...</p>
            </div>

            <div class="topic-grid" id="topicGrid">
                <!-- populated by JS -->
            </div>

            <button class="btn btn-accent btn-large" id="startAllBtn" onclick="startQuiz('')">
                Toate tematicile
            </button>
        </div>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="screen">
        <div class="quiz-container">
            <div class="quiz-topbar">
                <button class="btn btn-ghost" onclick="goHome()">Inapoi</button>
                <div class="score-pill" id="scoreDisplay">0 / 0</div>
                <button class="btn btn-accent" id="nextBtn" onclick="loadQuestion()">Urmatoarea</button>
            </div>

            <main id="quizArea" class="quiz-area">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <span>Se incarca intrebarea...</span>
                </div>
            </main>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
